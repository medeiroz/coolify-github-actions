name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Run tests
        run: npm test

      - name: Check build
        run: |
          npm run build
          git diff --exit-code deploy/dist/ wait/dist/ || \
            (echo "::error::dist/ is out of date. Run 'npm run build' and commit." && exit 1)
